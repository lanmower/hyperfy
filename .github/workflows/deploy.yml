name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint
        continue-on-error: true

      - name: Build client
        run: npm run client:build

      - name: Build project
        run: npm run build

      - name: Run pre-deployment checks
        run: node src/scripts/verify-deploy.js

      - name: Get build info
        id: build-info
        run: |
          BUILD_SIZE=$(du -sh build/ | cut -f1)
          BUILD_HASH=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "BUILD_SIZE=$BUILD_SIZE" >> $GITHUB_OUTPUT
          echo "BUILD_HASH=$BUILD_HASH" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Create deployment artifact
        run: |
          tar -czf hyperfy-build-${{ steps.build-info.outputs.BUILD_HASH }}.tar.gz build/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperfy-build-${{ steps.build-info.outputs.BUILD_HASH }}
          path: hyperfy-build-${{ steps.build-info.outputs.BUILD_HASH }}.tar.gz
          retention-days: 30

      - name: Trigger Coolify deployment
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          DEPLOYMENT_TOKEN: ${{ secrets.DEPLOYMENT_TOKEN }}
        run: |
          if [ -n "$COOLIFY_WEBHOOK" ]; then
            curl -X POST "$COOLIFY_WEBHOOK" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $DEPLOYMENT_TOKEN" \
              -d '{
                "event": "deployment",
                "commit": "${{ steps.build-info.outputs.BUILD_HASH }}",
                "branch": "${{ github.ref_name }}",
                "version": "${{ steps.build-info.outputs.VERSION }}",
                "timestamp": "${{ steps.build-info.outputs.BUILD_TIME }}",
                "build_size": "${{ steps.build-info.outputs.BUILD_SIZE }}"
              }' || echo "Coolify webhook not configured, skipping"
          fi

      - name: Create release tag
        if: success()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git tag -a "v${{ steps.build-info.outputs.VERSION }}-${{ steps.build-info.outputs.BUILD_HASH }}" \
            -m "Automated deployment: ${{ steps.build-info.outputs.BUILD_TIME }}" || true
          git push origin "v${{ steps.build-info.outputs.VERSION }}-${{ steps.build-info.outputs.BUILD_HASH }}" 2>/dev/null || true

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.build-info.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ steps.build-info.outputs.BUILD_HASH }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Size:** ${{ steps.build-info.outputs.BUILD_SIZE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** ${{ steps.build-info.outputs.BUILD_TIME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Success" >> $GITHUB_STEP_SUMMARY
