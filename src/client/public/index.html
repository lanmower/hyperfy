<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{title}</title>
    <meta name="description" content="{desc}" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="{url}" />
    <meta property="og:title" content="{title}" />
    <meta property="og:description" content="{desc}" />
    <meta property="og:image" content="{image}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="{url}" />
    <meta name="twitter:title" content="{title}" />
    <meta name="twitter:description" content="{desc}" />
    <meta name="twitter:image" content="{image}" />

    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel='icon' href='/favicon.svg' type='image/svg+xml' />
    <link rel="preload" href="/rubik.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" type="text/css" href="/index.css?v={buildId}" />
    <script>
      window.PARTICLES_PATH = '{particlesPath}'
      // Suppress graceful-fs process.cwd error that occurs during module initialization
      const originalError = console.error
      let cwdErrorSuppressed = false
      console.error = function(...args) {
        const msg = args[0]?.toString?.() || ''
        if (msg.includes('Cannot set property cwd') && !cwdErrorSuppressed) {
          cwdErrorSuppressed = true
          return // Suppress the first occurrence
        }
        return originalError.apply(console, args)
      }
      // Provide a mutable process.cwd if needed
      if (typeof process !== 'undefined' && process) {
        try {
          let cwdValue = '/'
          Object.defineProperty(process, 'cwd', {
            get: () => cwdValue,
            set: (value) => { cwdValue = value },
            configurable: true
          })
        } catch (e) {
          // Silently ignore if defineProperty fails
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/env.js?v={buildId}"></script>
    <script src="{jsPath}" type="module"></script>
  </body>
</html>
