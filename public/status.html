<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyperfy Status</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f1419;
      --bg-secondary: #1a1f29;
      --bg-tertiary: #252d3a;
      --text-primary: #e4e6eb;
      --text-secondary: #b0b3b8;
      --text-muted: #8a8d91;
      --border: #3a3f4b;
      --green: #2ecc71;
      --yellow: #f39c12;
      --red: #e74c3c;
      --blue: #3498db;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 30px 0;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5em;
      font-weight: 600;
      margin-bottom: 10px;
    }

    header .subtitle {
      color: var(--text-secondary);
      font-size: 1.1em;
    }

    .system-overview {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }

    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.healthy {
      background: rgba(46, 204, 113, 0.15);
      color: var(--green);
    }

    .status-badge.degraded {
      background: rgba(243, 156, 18, 0.15);
      color: var(--yellow);
    }

    .status-badge.down {
      background: rgba(231, 76, 60, 0.15);
      color: var(--red);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .metric {
      background: var(--bg-tertiary);
      padding: 20px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .metric-label {
      color: var(--text-muted);
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 1.8em;
      font-weight: 600;
      color: var(--text-primary);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .service-card {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 25px;
      border: 1px solid var(--border);
    }

    .service-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .service-name {
      font-size: 1.3em;
      font-weight: 600;
      text-transform: capitalize;
    }

    .service-status {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .service-status.healthy {
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
    }

    .service-status.degraded {
      background: var(--yellow);
      box-shadow: 0 0 10px var(--yellow);
    }

    .service-status.down {
      background: var(--red);
      box-shadow: 0 0 10px var(--red);
    }

    .service-detail {
      color: var(--text-secondary);
      font-size: 0.9em;
      margin: 5px 0;
      display: flex;
      justify-content: space-between;
    }

    .section {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }

    .section-title {
      font-size: 1.5em;
      font-weight: 600;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 10px;
    }

    .circuit-breaker {
      background: var(--bg-tertiary);
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 15px;
      border: 1px solid var(--border);
    }

    .circuit-breaker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .circuit-breaker-name {
      font-weight: 600;
      font-size: 1.1em;
    }

    .circuit-state {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.85em;
      font-weight: 600;
    }

    .circuit-state.CLOSED {
      background: rgba(46, 204, 113, 0.15);
      color: var(--green);
    }

    .circuit-state.HALF_OPEN {
      background: rgba(243, 156, 18, 0.15);
      color: var(--yellow);
    }

    .circuit-state.OPEN {
      background: rgba(231, 76, 60, 0.15);
      color: var(--red);
    }

    .history-item {
      background: var(--bg-tertiary);
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 10px;
      border-left: 4px solid var(--border);
    }

    .history-item.degradation {
      border-left-color: var(--yellow);
    }

    .history-item.recovery {
      border-left-color: var(--green);
    }

    .history-time {
      color: var(--text-muted);
      font-size: 0.85em;
      margin-bottom: 5px;
    }

    .history-service {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 3px;
    }

    .history-message {
      color: var(--text-secondary);
      font-size: 0.9em;
    }

    .error-item {
      background: var(--bg-tertiary);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      border-left: 3px solid var(--red);
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
    }

    .error-level {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8em;
      font-weight: 600;
      margin-right: 8px;
    }

    .error-level.ERROR {
      background: rgba(231, 76, 60, 0.2);
      color: var(--red);
    }

    .error-level.WARN {
      background: rgba(243, 156, 18, 0.2);
      color: var(--yellow);
    }

    .error-level.CRITICAL {
      background: var(--red);
      color: white;
    }

    .last-updated {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9em;
      margin-top: 30px;
      padding: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: var(--blue);
      transition: width 0.3s ease;
    }

    @media (max-width: 768px) {
      .metrics-grid {
        grid-template-columns: 1fr;
      }

      .services-grid {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 1.8em;
      }
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }

    .spinner {
      border: 3px solid var(--bg-tertiary);
      border-top: 3px solid var(--blue);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>Hyperfy Status</h1>
      <p class="subtitle">Real-time system health and performance monitoring</p>
    </div>
  </header>

  <div class="container">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading status information...</p>
    </div>

    <div id="content" style="display: none;">
      <div class="system-overview">
        <h2 style="margin-bottom: 15px;">System Overview</h2>
        <span id="system-status" class="status-badge">Loading...</span>
        <div class="metrics-grid">
          <div class="metric">
            <div class="metric-label">Uptime</div>
            <div class="metric-value" id="uptime">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Memory (Heap)</div>
            <div class="metric-value" id="memory">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Services Healthy</div>
            <div class="metric-value" id="services-healthy">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Active Connections</div>
            <div class="metric-value" id="connections">-</div>
          </div>
        </div>
      </div>

      <h2 style="margin-bottom: 20px; color: var(--text-primary);">Service Status</h2>
      <div id="services" class="services-grid"></div>

      <div class="section" id="circuit-breakers-section" style="display: none;">
        <h2 class="section-title">Circuit Breakers</h2>
        <div id="circuit-breakers"></div>
      </div>

      <div class="section" id="degradation-section" style="display: none;">
        <h2 class="section-title">Degradation Status</h2>
        <div id="degradation"></div>
      </div>

      <div class="section" id="errors-section" style="display: none;">
        <h2 class="section-title">Recent Errors</h2>
        <div id="errors"></div>
      </div>

      <div class="section" id="history-section" style="display: none;">
        <h2 class="section-title">Incident History</h2>
        <div id="history"></div>
      </div>

      <div class="last-updated">
        Last updated: <span id="last-updated">-</span>
      </div>
    </div>
  </div>

  <script>
    let eventSource = null

    function formatTime(isoString) {
      const date = new Date(isoString)
      return date.toLocaleString()
    }

    function formatRelativeTime(timestamp) {
      const now = Date.now()
      const diff = now - timestamp
      const seconds = Math.floor(diff / 1000)
      const minutes = Math.floor(seconds / 60)
      const hours = Math.floor(minutes / 60)
      const days = Math.floor(hours / 24)

      if (days > 0) return `${days}d ago`
      if (hours > 0) return `${hours}h ago`
      if (minutes > 0) return `${minutes}m ago`
      return `${seconds}s ago`
    }

    function renderSystemStatus(data) {
      const system = data.system
      const services = data.services

      const statusBadge = document.getElementById('system-status')
      statusBadge.textContent = system.status
      statusBadge.className = `status-badge ${system.status}`

      document.getElementById('uptime').textContent = system.uptime || '-'
      document.getElementById('memory').textContent = system.memory
        ? `${system.memory.heapUsed} MB / ${system.memory.heapTotal} MB`
        : '-'

      if (services) {
        const serviceList = Object.values(services)
        const healthyCount = serviceList.filter(s => s.status === 'healthy').length
        document.getElementById('services-healthy').textContent = `${healthyCount} / ${serviceList.length}`
      }

      const wsService = services?.websocket
      if (wsService) {
        document.getElementById('connections').textContent = wsService.connections || 0
      }
    }

    function renderServices(services) {
      const container = document.getElementById('services')
      container.innerHTML = ''

      for (const [name, service] of Object.entries(services)) {
        const card = document.createElement('div')
        card.className = 'service-card'

        let details = ''
        if (service.connections !== undefined) {
          details += `<div class="service-detail"><span>Connections:</span><span>${service.connections}</span></div>`
        }
        if (service.entities !== undefined) {
          details += `<div class="service-detail"><span>Entities:</span><span>${service.entities}</span></div>`
        }
        if (service.metrics?.totalQueries !== undefined) {
          details += `<div class="service-detail"><span>Queries/min:</span><span>${service.metrics.totalQueries}</span></div>`
        }
        if (service.metrics?.avgDuration !== undefined) {
          details += `<div class="service-detail"><span>Avg Query:</span><span>${service.metrics.avgDuration}ms</span></div>`
        }
        if (service.cache?.hitRate !== undefined) {
          details += `<div class="service-detail"><span>Cache Hit Rate:</span><span>${Math.round(service.cache.hitRate * 100)}%</span></div>`
        }

        card.innerHTML = `
          <div class="service-header">
            <div class="service-name">${name}</div>
            <div class="service-status ${service.status}"></div>
          </div>
          ${details}
          ${service.message ? `<div class="service-detail" style="margin-top: 10px; color: var(--text-muted);">${service.message}</div>` : ''}
        `

        container.appendChild(card)
      }
    }

    function renderCircuitBreakers(data) {
      if (!data) {
        document.getElementById('circuit-breakers-section').style.display = 'none'
        return
      }

      document.getElementById('circuit-breakers-section').style.display = 'block'
      const container = document.getElementById('circuit-breakers')
      container.innerHTML = ''

      for (const [name, breaker] of Object.entries(data.breakers)) {
        const div = document.createElement('div')
        div.className = 'circuit-breaker'

        div.innerHTML = `
          <div class="circuit-breaker-header">
            <div class="circuit-breaker-name">${name}</div>
            <div class="circuit-state ${breaker.state}">${breaker.state}</div>
          </div>
          <div class="service-detail">
            <span>Failures:</span><span>${breaker.failures}</span>
          </div>
          <div class="service-detail">
            <span>Successes:</span><span>${breaker.successes}</span>
          </div>
          ${breaker.lastFailureTime ? `<div class="service-detail"><span>Last Failure:</span><span>${formatRelativeTime(breaker.lastFailureTime)}</span></div>` : ''}
        `

        container.appendChild(div)
      }
    }

    function renderDegradation(data) {
      if (!data || data.mode === 'NORMAL') {
        document.getElementById('degradation-section').style.display = 'none'
        return
      }

      document.getElementById('degradation-section').style.display = 'block'
      const container = document.getElementById('degradation')

      const degradedServices = Object.entries(data.services || {})
        .filter(([_, service]) => service.degraded)
        .map(([name, _]) => name)

      container.innerHTML = `
        <div class="metric" style="margin-bottom: 15px;">
          <div class="metric-label">Degradation Mode</div>
          <div class="metric-value" style="color: var(--yellow);">${data.mode}</div>
        </div>
        ${degradedServices.length > 0 ? `
          <div style="color: var(--text-secondary);">
            <strong>Degraded Services:</strong> ${degradedServices.join(', ')}
          </div>
        ` : ''}
      `
    }

    function renderErrors(data) {
      if (!data || data.total === 0) {
        document.getElementById('errors-section').style.display = 'none'
        return
      }

      document.getElementById('errors-section').style.display = 'block'
      const container = document.getElementById('errors')

      let html = `
        <div class="metrics-grid" style="margin-bottom: 20px;">
          <div class="metric">
            <div class="metric-label">Total Errors</div>
            <div class="metric-value">${data.total}</div>
          </div>
      `

      if (data.byLevel) {
        for (const [level, count] of Object.entries(data.byLevel)) {
          if (count > 0) {
            html += `
              <div class="metric">
                <div class="metric-label">${level}</div>
                <div class="metric-value">${count}</div>
              </div>
            `
          }
        }
      }

      html += '</div>'

      if (data.recent && data.recent.length > 0) {
        html += '<h3 style="margin-bottom: 10px; color: var(--text-secondary);">Recent Errors</h3>'
        for (const error of data.recent.slice(0, 5)) {
          html += `
            <div class="error-item">
              <span class="error-level ${error.level || 'ERROR'}">${error.level || 'ERROR'}</span>
              ${error.message || error.error || 'Unknown error'}
            </div>
          `
        }
      }

      container.innerHTML = html
    }

    function renderHistory(incidents) {
      if (!incidents || incidents.length === 0) {
        document.getElementById('history-section').style.display = 'none'
        return
      }

      document.getElementById('history-section').style.display = 'block'
      const container = document.getElementById('history')
      container.innerHTML = ''

      for (const incident of incidents.slice(0, 20)) {
        const div = document.createElement('div')
        div.className = `history-item ${incident.status === 'RECOVERED' ? 'recovery' : 'degradation'}`

        div.innerHTML = `
          <div class="history-time">${formatRelativeTime(incident.timestamp)}</div>
          <div class="history-service">${incident.service}</div>
          <div class="history-message">${incident.status}${incident.reason ? ': ' + incident.reason : ''}</div>
        `

        container.appendChild(div)
      }
    }

    async function fetchStatus() {
      try {
        const response = await fetch('/api/status')
        const data = await response.json()

        document.getElementById('loading').style.display = 'none'
        document.getElementById('content').style.display = 'block'

        renderSystemStatus(data)
        renderServices(data.services)
        renderCircuitBreakers(data.circuitBreakers)
        renderDegradation(data.degradation)
        renderErrors(data.errors)
        renderHistory(data.incidents)

        document.getElementById('last-updated').textContent = formatTime(data.timestamp)
      } catch (err) {
        console.error('Failed to fetch status:', err)
        document.getElementById('loading').innerHTML = `
          <div class="spinner"></div>
          <p style="color: var(--red);">Failed to load status. Retrying...</p>
        `
      }
    }

    function startSSE() {
      eventSource = new EventSource('/status/stream')

      eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data)
        const statusBadge = document.getElementById('system-status')
        if (statusBadge && data.system) {
          statusBadge.textContent = data.system.status
          statusBadge.className = `status-badge ${data.system.status}`
          document.getElementById('uptime').textContent = data.system.uptime || '-'
        }
      }

      eventSource.onerror = () => {
        console.log('SSE connection lost, will retry...')
      }
    }

    fetchStatus()
    setInterval(fetchStatus, 30000)
    startSSE()
  </script>
</body>
</html>
